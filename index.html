```html
<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Challenge</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:20px;
}

button,input{
    padding:10px;
    margin:5px;
    font-size:16px;
}

.hidden{
    display:none;
}
</style>
</head>
<body>

<h1>🔥 SECRET CHALLENGE 🔥</h1>

<h2 id="level">Level 1</h2>

<p id="text"></p>

<div id="content"></div>

<button id="nextBtn" class="hidden">
Nästa nivå
</button>

<button onclick="adminPanel()">
🔑 Admin Panel
</button>

<div id="win" class="hidden">
<h2>🏆 DU VANN!</h2>

<button onclick="alert('🔥 SECRET UNLOCKED!')">
🔥 SECRET BUTTON 🔥
</button>
</div>

<script>

let level = 1;

const ADMIN_CODE =
"BABEBE_ADMIN_2026";

const FINAL_CODE =
"X7mP92_Kr4k3n_817Qz_L0ck";

const levelEl =
document.getElementById("level");

const textEl =
document.getElementById("text");

const contentEl =
document.getElementById("content");

const nextBtn =
document.getElementById("nextBtn");

nextBtn.onclick = () => {
    level++;
    nextBtn.classList.add("hidden");
    renderLevel();
};

function adminPanel(){

    const code =
    prompt("Admin-kod:");

    if(code !== ADMIN_CODE){
        alert("Fel kod");
        return;
    }

    const target =
    parseInt(
    prompt("Nivå? (1-10 eller 666)")
    );

    if(
    (target >= 1 && target <= 10)
    || target === 666
    ){
        level = target;
        renderLevel();
    }
}

function finishGame(){

    levelEl.innerText = "KLAR!";
    textEl.innerText =
    "Du klarade spelet!";

    contentEl.innerHTML = "";

    nextBtn.style.display =
    "none";

    document
    .getElementById("win")
    .classList.remove("hidden");
}

function renderLevel(){

    levelEl.innerText =
    "Level " + level;

    contentEl.innerHTML = "";

    if(level === 666){

        textEl.innerText =
        "🔥 SECRET LEVEL 666 🔥";

        contentEl.innerHTML =
        `
        <p>Skriv: Admin är bäst</p>
        <input id="answer">
        <button onclick="check666()">
        OK
        </button>
        `;

        return;
    }

    switch(level){

        case 1:
            textEl.innerText =
            "Klicka på knappen";

            contentEl.innerHTML =
            `<button onclick="unlock()">
            Klicka
            </button>`;
        break;

        case 2:
            textEl.innerText =
            "Vad är 5 + 5 ?";

            contentEl.innerHTML =
            `<input id="answer">
            <button onclick="check('10')">
            OK
            </button>`;
        break;

        case 3:
            textEl.innerText =
            "Skriv hej";

            contentEl.innerHTML =
            `<input id="answer">
            <button onclick="check('hej')">
            OK
            </button>`;
        break;

        case 4:
            textEl.innerText =
            "Vad är 7 + 8 ?";

            contentEl.innerHTML =
            `<input id="answer">
            <button onclick="check('15')">
            OK
            </button>`;
        break;

        case 5:
            textEl.innerText =
            "Skriv GitHub";

            contentEl.innerHTML =
            `<input id="answer">
            <button onclick="check('github')">
            OK
            </button>`;
        break;

        case 6:
            textEl.innerText =
            "Klicka 3 gånger";

            contentEl.innerHTML =
            `<button id="multi">
            Klicka mig
            </button>`;

            let c = 0;

            document
            .getElementById("multi")
            .onclick = () => {

                c++;

                if(c >= 3){
                    unlock();
                }
            };
        break;

        case 7:
            textEl.innerText =
            "Vad är 12 × 12 ?";

            contentEl.innerHTML =
            `<input id="answer">
            <button onclick="check('144')">
            OK
            </button>`;
        break;

        case 8:
            textEl.innerText =
            "Ledtråd: 583";

            contentEl.innerHTML =
            `<input id="answer">
            <button onclick="check('583')">
            OK
            </button>`;
        break;

        case 9:
            textEl.innerText =
            "Vad har nycklar men inga lås?";

            contentEl.innerHTML =
            `<input id="answer">
            <button onclick="check('piano')">
            OK
            </button>`;
        break;

        case 10:
            textEl.innerText =
            "Skriv slutkoden";

            contentEl.innerHTML =
            `<input id="answer">
            <button onclick="checkFinal()">
            OK
            </button>`;
        break;

        default:
            finishGame();
    }
}

function unlock(){
    nextBtn.classList.remove("hidden");
}

function check(correct){

    const value =
    document
    .getElementById("answer")
    .value
    .toLowerCase();

    if(value === correct){
        unlock();
    }
}

function checkFinal(){

    const value =
    document
    .getElementById("answer")
    .value;

    if(value === FINAL_CODE){
        finishGame();
    }
}

function check666(){

    const value =
    document
    .getElementById("answer")
    .value
    .toLowerCase();

    if(value === "admin är bäst"){
        finishGame();
    }
}

renderLevel();

</script>

</body>
</html>
```

<script>

let level = 1;

let failedFinalCodes = 0;

const ADMIN_CODE =
"BABEBE_ADMIN_2026";

const FINAL_CODE =
"X7mP92_Kr4k3n_817Qz_L0ck";

const levelEl =
document.getElementById("level");

const textEl =
document.getElementById("text");

const contentEl =
document.getElementById("content");

const nextBtn =
document.getElementById("nextBtn");

nextBtn.onclick = () => {

    level++;

    nextBtn.classList.add("hidden");

    renderLevel();
};

function showEnding(title,msg){

    document
    .getElementById("ending")
    .classList
    .remove("hidden");

    document
    .getElementById("ending")
    .innerHTML =
    "<h1>"+title+"</h1><p>"+msg+"</p>";

    levelEl.innerText="";
    textEl.innerText="";
    contentEl.innerHTML="";
    nextBtn.style.display="none";
}

function normalEnding(){

    showEnding(
    "🏆 NORMAL ENDING",
    "Du klarade hela spelet!"
    );
}

function adminEnding(){

    showEnding(
    "😎 ADMIN ENDING",
    "Admin är bäst!"
    );
}

function secretEnding(){

    showEnding(
    "👑 SECRET ENDING",
    "Du hittade den dolda knappen!"
    );
}

function trollEnding(){

    showEnding(
    "🤡 TROLL ENDING",
    "Fem felkoder i rad..."
    );
}

function adminPanel(){

    const code =
    prompt("Admin-kod:");

    if(code !== ADMIN_CODE){
        alert("Fel kod!");
        return;
    }

    const target =
    parseInt(
    prompt("Nivå? 1-10 eller 666")
    );

    if(
    (target>=1 && target<=10)
    ||
    target===666
    ){
        level = target;
        renderLevel();
    }
}

function unlock(){
    nextBtn.classList.remove("hidden");
}

function renderLevel(){

    levelEl.innerText =
    "Level " + level;

    contentEl.innerHTML="";

    if(level===666){

        textEl.innerText =
        "🔥 SECRET LEVEL 666 🔥";

        contentEl.innerHTML=
        `
        <p>Skriv: Admin är bäst</p>

        <input id="answer">

        <button onclick="check666()">
        OK
        </button>
        `;

        return;
    }

    switch(level){

        case 1:

        textEl.innerText =
        "Klicka på knappen";

        contentEl.innerHTML=
        `
        <button onclick="unlock()">
        Klicka
        </button>
        `;
        break;

        case 2:

        textEl.innerText =
        "Vad är 5 + 5 ?";

        contentEl.innerHTML=
        `
        <input id="answer">
        <button onclick="check('10')">
        OK
        </button>
        `;
        break;

        textEl.innerText =
        "Skriv hej";

        contentEl.innerHTML=
        `
        <input id="answer">
        <button onclick="check('hej')">
        OK
        </button>
        `;
        break;

        textEl.innerText =
        "Vad är 7 + 8 ?";

        contentEl.innerHTML=
        `
        <input id="answer">
        <button onclick="check('15')">
        OK
        </button>
        `;
        break;

function check(correct){

    let value =
    document
    .getElementById("answer")
    .value
    .toLowerCase();

    if(value === correct){
        unlock();
    }
}

function checkFinal(){

    let value =
    document
    .getElementById("answer")
    .value;

    if(value === FINAL_CODE){

        normalEnding();

    }else{

        failedFinalCodes++;

        if(
        failedFinalCodes >= 5
        ){
            trollEnding();
        }else{
            alert(
            "Fel kod! (" +
            failedFinalCodes +
            "/5)"
            );
        }
    }
}

function check666(){

    let value =
    document
    .getElementById("answer")
    .value
    .toLowerCase();

    if(
    value ===
    "admin är bäst"
    ){
        adminEnding();
    }
}

```html
<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Secret Challenge 🔥</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
}

#game{
    max-width:700px;
    margin:auto;
}

button{
    padding:12px 24px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

input{
    padding:10px;
    font-size:16px;
}

.hidden{
    display:none;
}

#secretBtn{
    font-size:22px;
    font-weight:bold;
}
</style>
</head>
<body>

<div id="game">
    <h1>🔥 SECRET CHALLENGE 🔥</h1>

    <h2 id="level">Level 1</h2>

    <p id="text"></p>

    <div id="content"></div>

    <br>

    <button id="nextBtn" class="hidden">
        Nästa nivå
    </button>

    <button onclick="adminPanel()">
        🔑 Admin Panel
    </button>

    <div id="win" class="hidden">
        <h2>🏆 Du klarade alla nivåer!</h2>

        <button id="secretBtn"
        onclick="alert('🎉 SECRET UNLOCKED!')">
            🔥 SECRET BUTTON 🔥
        </button>
    </div>
</div>

<script>

let level = 1;

const ADMIN_CODE = "BABEBE_ADMIN_2026";

const levelText = document.getElementById("level");
const text = document.getElementById("text");
const content = document.getElementById("content");
const nextBtn = document.getElementById("nextBtn");

nextBtn.onclick = () => {
    nextBtn.classList.add("hidden");
    level++;
    renderLevel();
};

function adminPanel(){

    let code = prompt("Admin-kod:");

    if(code !== ADMIN_CODE){
        alert("Fel kod!");
        return;
    }

    let target =
    parseInt(prompt("Vilken nivå? (1-10)"));

    if(target >= 1 && target <= 10){
        level = target;
        nextBtn.classList.add("hidden");
        renderLevel();
    }
}

function finishGame(){

    levelText.innerText = "KLAR!";
    text.innerText =
    "Du hittade den hemliga knappen!";

    content.innerHTML = "";

    nextBtn.style.display = "none";

    document
    .getElementById("win")
    .classList.remove("hidden");
}

function renderLevel(){

    if(level > 10){
        finishGame();
        return;
    }

    levelText.innerText =
    "Level " + level;

    content.innerHTML = "";

    switch(level){

        case 1:
            text.innerText =
            "Klicka på knappen.";

            let b1 =
            document.createElement("button");

            b1.innerText = "Klicka";

            b1.onclick = () =>
            nextBtn.classList.remove("hidden");

            content.appendChild(b1);
        break;

        case 2:
            text.innerText =
            "Vänta 3 sekunder.";

            setTimeout(()=>{
                nextBtn.classList.remove("hidden");
            },3000);
        break;

        case 3:
            text.innerText =
            "Vad är 7 + 8 ?";

            content.innerHTML =
            '<input id="a"><button onclick="check3()">OK</button>';
        break;

        case 4:
            text.innerText =
            'Skriv "hemlig" baklänges';

            content.innerHTML =
            '<input id="a"><button onclick="check4()">OK</button>';
        break;

        case 5:
            text.innerText =
            "Klicka på den gröna knappen";

            content.innerHTML =
            `
            <button>Röd</button>
            <button id="green">Grön</button>
            <button>Blå</button>
            `;

            document
            .getElementById("green")
            .onclick = ()=>{
                nextBtn.classList.remove("hidden");
            };
        break;

        case 6:
            text.innerText =
            "Klicka på knappen 3 gånger";

            let count = 0;

            let btn =
            document.createElement("button");

            btn.innerText = "Klicka mig";

            btn.onclick = ()=>{

                count++;

                btn.innerText =
                "Klick " + count + "/3";

                if(count >= 3){
                    nextBtn.classList.remove("hidden");
                }
            };

            content.appendChild(btn);
        break;

        case 7:
            text.innerText =
            "Vad är 12 × 12 ?";

            content.innerHTML =
            '<input id="a"><button onclick="check7()">OK</button>';
        break;

        case 8:
            text.innerHTML =
            "Ledtråd: 583";

            content.innerHTML +=
            '<br><input id="a"><button onclick="check8()">OK</button>';
        break;

        case 9:
            text.innerText =
            "Vad har nycklar men inga lås?";

            content.innerHTML =
            '<input id="a"><button onclick="check9()">OK</button>';
        break;

        case 10:
            text.innerText =
            "Skriv den hemliga slutkoden";

            content.innerHTML =
            '<input id="a"><button onclick="check10()">OK</button>';
        break;
    }
}

function check3(){
    if(document.getElementById("a").value=="15")
        nextBtn.classList.remove("hidden");
}

function check4(){
    if(document.getElementById("a").value.toLowerCase()=="gilmeh")
        nextBtn.classList.remove("hidden");
}

function check7(){
    if(document.getElementById("a").value=="144")
        nextBtn.classList.remove("hidden");
}

function check8(){
    if(document.getElementById("a").value=="583")
        nextBtn.classList.remove("hidden");
}

function check9(){

    let v =
    document.getElementById("a")
    .value.toLowerCase();

    if(v.includes("piano")){
        nextBtn.classList.remove("hidden");
    }
}

function check10(){

    if(
    document.getElementById("a").value
    ===
    "X7mP92_Kr4k3n_817Qz_L0ck"
    ){
        finishGame();
    }else{
        alert("Fel kod!");
    }
}

renderLevel();

</script>

</body>
</html>
```
